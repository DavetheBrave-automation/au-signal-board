<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong Terminal — AU</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Chakra+Petch:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0e14;--s1:#131620;--s2:#181c28;--bd:#2a3045;
  --g:#5efa9e;--gd:#3ab876;--r:#ff6b8a;--rd:#cc4466;
  --y:#f0c050;--b:#60a0f0;--c:#60d0d0;--p:#a78bfa;
  --t:#d0d8e8;--m:#6a7594;--w:#e8ecf4;
}
[data-theme="light"]{
  --bg:#f2f3f7;--s1:#e8eaef;--s2:#dddfe6;--bd:#c0c6d4;
  --g:#1a9e58;--gd:#1a7a44;--r:#c0284a;--rd:#a01030;
  --y:#9a7a10;--b:#2060c0;--c:#1a9090;--p:#6040d0;
  --t:#1a2030;--m:#5a6575;--w:#080e20;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--t);font-family:'IBM Plex Mono',monospace;font-size:14px;line-height:1.6}
.wrap{max-width:1100px;margin:0 auto;padding:16px}

/* HEADER */
.hdr{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px;padding-bottom:14px;border-bottom:2px solid var(--bd);margin-bottom:18px}
.hdr-left{font-size:12px;color:var(--m)}
.hdr-left a{color:var(--m);text-decoration:none;margin-right:12px;padding:3px 8px;border:1px solid var(--bd);border-radius:3px;font-size:11px}
.hdr-left a:hover{color:var(--g);border-color:var(--gd)}
.hdr-title{text-align:center}
.hdr-title h1{font-family:'Chakra Petch',sans-serif;font-size:22px;font-weight:700;color:var(--g);letter-spacing:2px}
.hdr-title .sub{font-size:11px;color:var(--m);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:10px;justify-content:flex-end}
.theme-btn{background:none;border:1px solid var(--bd);color:var(--m);cursor:pointer;padding:4px 8px;border-radius:3px;font-size:11px;font-family:'IBM Plex Mono',monospace}
.theme-btn:hover{color:var(--g);border-color:var(--gd)}

/* STAT STRIP */
.stat-strip{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;align-items:center}
.stat{background:var(--s1);border:1px solid var(--bd);border-radius:4px;padding:8px 12px;text-align:center;min-width:110px}
.stat-v{font-family:'Chakra Petch',sans-serif;font-size:18px;font-weight:700}
.stat-l{font-size:10px;color:var(--m);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.fg-badge{padding:6px 14px;border-radius:4px;font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px}
.fg-fear{background:rgba(255,107,138,0.12);color:var(--r);border:1px solid var(--rd)}
.fg-neutral{background:rgba(96,160,240,0.1);color:var(--b);border:1px solid #4070b0}
.fg-greed{background:rgba(94,250,158,0.1);color:var(--g);border:1px solid var(--gd)}

/* FLEET SIGNALS */
.fleet-grid{display:grid;grid-template-columns:80px 1fr;gap:8px 0;margin-bottom:18px;background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:12px 14px}
.fleet-asset{font-family:'Chakra Petch',sans-serif;font-size:12px;font-weight:700;color:var(--w);display:flex;align-items:center}
.fleet-badges{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;letter-spacing:.5px;font-family:'Chakra Petch',sans-serif;display:inline-block;white-space:nowrap}
.badge-g{background:rgba(94,250,158,0.1);color:var(--g);border:1px solid var(--gd)}
.badge-r{background:rgba(255,107,138,0.1);color:var(--r);border:1px solid var(--rd)}
.badge-y{background:rgba(240,192,80,0.1);color:var(--y);border:1px solid #c09830}
.badge-b{background:rgba(96,160,240,0.1);color:var(--b);border:1px solid #4070b0}
.badge-m{background:rgba(106,117,148,0.1);color:var(--m);border:1px solid #3a4458}
.badge-p{background:rgba(167,139,250,0.1);color:var(--p);border:1px solid #6040c0}
.badge-c{background:rgba(96,208,208,0.1);color:var(--c);border:1px solid #2a9090}
.fleet-sep{grid-column:1/-1;height:1px;background:var(--bd);margin:6px 0}

/* LADDERS */
.ladders{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.ladder-card{background:var(--s1);border:1px solid var(--bd);border-radius:6px;padding:12px}
.ladder-hdr{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.ladder-title{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:700}
.ladder-price{font-family:'Chakra Petch',sans-serif;font-size:18px;font-weight:700;color:var(--w)}
.ladder-meta{font-size:11px;color:var(--m);margin-bottom:6px}
.ladder-svg{width:100%;height:360px;display:block;overflow:visible}
.ladder-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.leg-item{font-size:10px;color:var(--m);display:flex;align-items:center;gap:4px}
.leg-line{width:16px;height:2px;display:inline-block}

/* SECTION */
.section{margin-bottom:24px}
.stitle{font-family:'Chakra Petch',sans-serif;font-size:15px;font-weight:600;color:var(--w);margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.stitle-sub{font-size:11px;color:var(--m);font-family:'IBM Plex Mono',monospace;font-weight:400}

/* TABLES */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--s2);color:var(--m);padding:8px 10px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bd);white-space:nowrap}
td{padding:8px 10px;border-bottom:1px solid #181c28;vertical-align:top;white-space:nowrap}
tr:hover td{background:var(--s2)}
.td-ticker{font-size:11px;color:var(--m);max-width:160px;overflow:hidden;text-overflow:ellipsis}

/* COLOR HELPERS */
.g{color:var(--g);font-weight:600}
.r{color:var(--r);font-weight:600}
.y{color:var(--y);font-weight:600}
.b{color:var(--b);font-weight:600}
.c{color:var(--c);font-weight:600}
.w{color:var(--w)}
.mu{color:var(--m)}
.strong{font-weight:700}

/* STATUS TAGS */
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.5px;font-family:'Chakra Petch',sans-serif;display:inline-block}
.tag-yes{background:rgba(94,250,158,0.12);color:var(--g);border:1px solid var(--gd)}
.tag-no{background:rgba(255,107,138,0.12);color:var(--r);border:1px solid var(--rd)}
.tag-sell{background:rgba(240,192,80,0.1);color:var(--y);border:1px solid #b09020}
.tag-buy{background:rgba(94,250,158,0.1);color:var(--g);border:1px solid var(--gd)}
.tag-rest{background:rgba(106,117,148,0.1);color:var(--m);border:1px solid #3a4458}

/* CATALYST TIMELINE */
.timeline{position:relative;padding:16px 0;margin:8px 0}
.tl-track{height:2px;background:var(--bd);position:relative;margin:28px 0}
.tl-events{display:flex;justify-content:space-between;align-items:stretch;gap:6px}
.tl-event{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:10px 10px;text-align:center;font-size:11px;min-width:0}
.tl-event.impact-extreme{border-color:var(--r)}
.tl-event.impact-high{border-color:var(--y)}
.tl-event.impact-med{border-color:var(--b)}
.tl-name{font-family:'Chakra Petch',sans-serif;font-size:11px;font-weight:700;margin-bottom:4px}
.tl-name.impact-extreme{color:var(--r)}
.tl-name.impact-high{color:var(--y)}
.tl-name.impact-med{color:var(--b)}
.tl-countdown{font-size:13px;font-weight:700;font-family:'Chakra Petch',sans-serif;margin:4px 0}
.tl-note{font-size:10px;color:var(--m);margin-top:2px;white-space:normal;line-height:1.4}
.tl-past{opacity:0.35;border-style:dashed}

/* RULES */
.rules-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.rule-card{background:var(--s1);border:1px solid var(--bd);border-radius:5px;padding:12px}
.rule-title{font-family:'Chakra Petch',sans-serif;font-size:11px;font-weight:700;color:var(--y);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.rule-card li{font-size:12px;color:var(--t);list-style:none;padding:2px 0;line-height:1.5}
.rule-card li::before{content:'▸ ';color:var(--m);font-size:11px}

/* FOOTER */
.footer{text-align:center;color:var(--bd);font-size:11px;margin-top:28px;padding-top:14px;border-top:1px solid var(--bd)}
.footer span{color:var(--gd)}

/* STATUS BANNER */
.loading{text-align:center;padding:40px;color:var(--m);font-size:13px}
.err-banner{background:rgba(255,107,138,0.08);border:1px solid rgba(255,107,138,0.3);border-radius:5px;padding:10px 14px;color:var(--r);font-size:13px;margin-bottom:14px;display:none}
.upd-bar{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--m);padding:4px 0;margin-bottom:4px}
.upd-dot{width:6px;height:6px;border-radius:50%;background:var(--gd);display:inline-block;margin-right:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* SUMMARY ROW */
.summary-row{display:flex;justify-content:space-between;align-items:center;background:var(--s2);border-radius:4px;padding:8px 12px;font-size:13px;margin-bottom:8px;flex-wrap:wrap;gap:6px}

/* RESPONSIVE */
@media(max-width:700px){
  .ladders{grid-template-columns:1fr}
  .rules-grid{grid-template-columns:1fr}
  .hdr{grid-template-columns:1fr;text-align:center}
  .hdr-right{justify-content:center}
  .tl-events{flex-direction:column}
  .tl-event{text-align:left;display:flex;align-items:center;gap:10px}
  .stat-strip{justify-content:center}
}
</style>
</head>
<body>
<div class="wrap">

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <a href="index.html">← Signal Board</a>
    <a href="architecture.html">Architecture</a>
  </div>
  <div class="hdr-title">
    <h1>PING PONG TERMINAL</h1>
    <div class="sub">ATHANOR UMBRA · LIVE DASHBOARD</div>
  </div>
  <div class="hdr-right">
    <button class="theme-btn" onclick="toggleTheme()">☀ LIGHT</button>
  </div>
</div>

<!-- ERROR / STATUS -->
<div class="err-banner" id="errBanner"></div>
<div class="upd-bar">
  <div><span class="upd-dot" id="upd-dot"></span><span id="upd-time">Loading...</span></div>
  <div id="upd-next" style="color:var(--m)"></div>
</div>

<!-- MAIN CONTENT -->
<div id="main"><div class="loading">Fetching dashboard data…</div></div>

</div><!-- .wrap -->

<script>
// ─── State ────────────────────────────────────────────────────────────────────
let _data = null;
let _lastFetch = null;
let _nextFetch = null;
let _refreshTimer = null;
let _countdownTimer = null;
const REFRESH_INTERVAL = 60000;

// ─── Theme ───────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.querySelector('.theme-btn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.setAttribute('data-theme', 'light');
    btn.textContent = '🌙 DARK';
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀ LIGHT';
  }
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function fmtDollar(v, dec=2) {
  if (v == null || isNaN(v)) return '—';
  const n = Number(v);
  return '$' + n.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
}
function fmtCents(v) {
  if (v == null || isNaN(v)) return '—';
  return Math.round(Number(v) * 100) + '¢';
}
function fmtPct(v, dec=1) {
  if (v == null || isNaN(v)) return '—';
  const n = Number(v);
  return (n >= 0 ? '+' : '') + n.toFixed(dec) + '%';
}
function fmtPrice(v, asset) {
  if (!v) return '—';
  const n = Number(v);
  if (asset === 'BTC') return '$' + Math.round(n).toLocaleString();
  return '$' + Math.round(n).toLocaleString();
}
function colorClass(v) {
  if (v == null || isNaN(v)) return '';
  return Number(v) >= 0 ? 'g' : 'r';
}
function phaseBadge(phase) {
  if (!phase) return '<span class="badge badge-m">—</span>';
  const p = phase.toUpperCase();
  if (p.includes('BULL') || p.includes('BREAK') || p.includes('ACCUM') || p.includes('BREAKOUT')) return `<span class="badge badge-g">${p}</span>`;
  if (p.includes('BEAR') || p.includes('DIST') || p.includes('CAP') || p.includes('CAPITULAT')) return `<span class="badge badge-r">${p}</span>`;
  if (p.includes('OVER') || p.includes('SNAP')) return `<span class="badge badge-p">${p}</span>`;
  if (p.includes('NEUTRAL') || p.includes('RANGE') || p.includes('FLAT')) return `<span class="badge badge-m">${p}</span>`;
  return `<span class="badge badge-y">${p}</span>`;
}
function cvdBadge(cvd) {
  if (!cvd) return '';
  const c = cvd.toUpperCase();
  if (c.includes('STRONG BULL')) return `<span class="badge badge-g">CVD: S.BULL</span>`;
  if (c.includes('BULL')) return `<span class="badge badge-g">CVD: BULL</span>`;
  if (c.includes('STRONG BEAR')) return `<span class="badge badge-r">CVD: S.BEAR</span>`;
  if (c.includes('BEAR')) return `<span class="badge badge-r">CVD: BEAR</span>`;
  return `<span class="badge badge-m">CVD: ${c.substring(0,8)}</span>`;
}
function fgClass(v) {
  const n = Number(v);
  if (n <= 25) return 'fg-fear';
  if (n >= 75) return 'fg-greed';
  return 'fg-neutral';
}
function fgLabel(v) {
  const n = Number(v);
  if (n <= 10) return 'EXTREME FEAR';
  if (n <= 25) return 'FEAR';
  if (n <= 45) return 'LEAN BEARISH';
  if (n <= 55) return 'NEUTRAL';
  if (n <= 75) return 'LEAN BULLISH';
  if (n <= 90) return 'GREED';
  return 'EXTREME GREED';
}
function countdown(dtStr) {
  const then = new Date(dtStr).getTime();
  const now = Date.now();
  const diff = then - now;
  if (diff <= 0) return null; // past
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h >= 48) return Math.floor(h/24) + 'd ' + (h%24) + 'h';
  if (h >= 1) return h + 'h ' + m + 'm';
  return m + 'm';
}
function secsAgo(tsStr) {
  if (!tsStr) return '';
  const t = new Date(tsStr).getTime();
  const d = Math.floor((Date.now() - t) / 1000);
  if (d < 60) return d + 's ago';
  if (d < 3600) return Math.floor(d/60) + 'm ago';
  return Math.floor(d/3600) + 'h ago';
}
function shortTicker(ticker, asset) {
  // KXBTCD-26APR0317-T68299.99 → BTC ≥$68,300
  try {
    const parts = ticker.split('-');
    if (parts.length >= 3 && parts[2].startsWith('T')) {
      const strike = Math.round(parseFloat(parts[2].substring(1)));
      const expiry = parts[1]; // 26APR0317
      return (asset || '?') + ' ≥$' + strike.toLocaleString() + ' · ' + expiry;
    }
  } catch(e) {}
  return ticker;
}

// ─── SVG Price Ladder ─────────────────────────────────────────────────────────
function buildLadder(container, assetKey, data) {
  const d = data.assets[assetKey];
  if (!d) { container.innerHTML = '<div style="padding:20px;color:var(--m);font-size:12px">No data</div>'; return; }

  const price = d.price || 0;
  const ema200 = d.ema_200 || 0;

  // Gather all relevant prices for range
  const relevant = [price, ema200, d.floor_1h, d.ceiling_1h, d.floor_4h, d.ceiling_4h, d.floor_1d, d.ceiling_1d]
    .filter(p => p && p > 0);

  // Add strikes from positions for this asset
  const positions = (data.positions || []).filter(p => p.asset === assetKey && p.strike > 0);
  positions.forEach(p => relevant.push(p.strike));

  if (relevant.length < 2) { container.innerHTML = '<div style="padding:20px;color:var(--m)">Insufficient data</div>'; return; }

  let minP = Math.min(...relevant);
  let maxP = Math.max(...relevant);
  const range = maxP - minP;
  minP -= range * 0.04;
  maxP += range * 0.04;

  const W = container.clientWidth || 320;
  const H = 360;
  const padL = 70, padR = 8, padT = 14, padB = 18;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  function yOf(p) {
    return padT + plotH - ((p - minP) / (maxP - minP)) * plotH;
  }
  function labelP(p) {
    if (assetKey === 'BTC') return '$' + Math.round(p).toLocaleString();
    return '$' + Math.round(p).toLocaleString();
  }

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.display = 'block';

  function el(tag, attrs, text) {
    const e = document.createElementNS(NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (text != null) e.textContent = text;
    return e;
  }
  function hline(y, color, dash, width) {
    return el('line', {x1:padL, y1:y, x2:padL+plotW, y2:y, stroke:color, 'stroke-dasharray':dash||'none', 'stroke-width':width||1});
  }
  function lbl(x, y, txt, color, size, anchor) {
    return el('text', {x, y, fill:color||'#6a7594', 'font-size':size||9, 'font-family':'IBM Plex Mono,monospace', 'text-anchor':anchor||'end'}, txt);
  }

  // 1h range band (subtle background)
  if (d.floor_1h > 0 && d.ceiling_1h > 0) {
    const yTop = yOf(d.ceiling_1h);
    const yBot = yOf(d.floor_1h);
    svg.appendChild(el('rect', {x:padL, y:yTop, width:plotW, height:Math.max(0,yBot-yTop), fill:'#5efa9e', opacity:'0.04'}));
  }

  // Price grid lines
  const gridSteps = 6;
  for (let i = 0; i <= gridSteps; i++) {
    const gp = minP + (maxP - minP) * i / gridSteps;
    const gy = yOf(gp);
    svg.appendChild(el('line', {x1:padL, y1:gy, x2:padL+plotW, y2:gy, stroke:'#1e2535', 'stroke-width':'0.5'}));
    svg.appendChild(lbl(padL - 4, gy + 3, labelP(gp), '#3a4560', 9, 'end'));
  }

  // 4h floor
  if (d.floor_4h > 0) {
    const y = yOf(d.floor_4h);
    if (y >= padT && y <= padT + plotH) {
      svg.appendChild(hline(y, '#5efa9e', '4,3', 1));
      svg.appendChild(lbl(padL - 4, y - 2, labelP(d.floor_4h), '#3ab876', 9, 'end'));
    }
  }

  // 4h ceiling
  if (d.ceiling_4h > 0) {
    const y = yOf(d.ceiling_4h);
    if (y >= padT && y <= padT + plotH) {
      svg.appendChild(hline(y, '#ff6b8a', '4,3', 1));
      svg.appendChild(lbl(padL - 4, y - 2, labelP(d.ceiling_4h), '#cc4466', 9, 'end'));
    }
  }

  // 1h floor (solid, brighter)
  if (d.floor_1h > 0) {
    const y = yOf(d.floor_1h);
    if (y >= padT && y <= padT + plotH) {
      svg.appendChild(hline(y, '#5efa9e', 'none', 1.5));
    }
  }

  // 1h ceiling (solid, brighter)
  if (d.ceiling_1h > 0) {
    const y = yOf(d.ceiling_1h);
    if (y >= padT && y <= padT + plotH) {
      svg.appendChild(hline(y, '#ff6b8a', 'none', 1.5));
    }
  }

  // EMA200
  if (ema200 > minP && ema200 < maxP) {
    const y = yOf(ema200);
    svg.appendChild(hline(y, '#f0c050', '6,3', 1.5));
    svg.appendChild(lbl(padL - 4, y - 3, 'EMA200', '#c09830', 9, 'end'));
  }

  // Position strikes
  positions.forEach((pos, idx) => {
    if (pos.strike < minP || pos.strike > maxP) return;
    const y = yOf(pos.strike);
    const x0 = padL + plotW * 0.25;
    svg.appendChild(el('line', {x1:x0, y1:y, x2:padL+plotW, y2:y, stroke:'#60a0f0', 'stroke-dasharray':'2,3', 'stroke-width':'1'}));
    svg.appendChild(el('circle', {cx:x0, cy:y, r:'3', fill:'#60a0f0'}));
    // Entry + sell target label
    const entry = Math.round(pos.avg_entry * 100);
    const sells = (pos.sell_targets || []).filter(s => s.price > 0);
    const sellTxt = sells.length > 0 ? ' → ' + Math.round(sells[0].price * 100) + '¢' : '';
    const posLabel = labelP(pos.strike) + '  ' + entry + '¢' + sellTxt;
    svg.appendChild(lbl(padL + plotW - 4, y - 4, posLabel, '#4a78c0', 9, 'end'));
    svg.appendChild(el('circle', {cx:padL+plotW-3, cy:y, r:'2', fill:'#60a0f0', opacity:'0.6'}));
  });

  // Current price (prominent white line)
  if (price > minP && price < maxP) {
    const y = yOf(price);
    svg.appendChild(hline(y, '#e8ecf4', 'none', 2));
    // Price tag
    const ptxt = labelP(price);
    const tw = ptxt.length * 6 + 8;
    svg.appendChild(el('rect', {x:padL, y:y-12, width:tw+4, height:14, fill:'#e8ecf4', rx:'2'}));
    svg.appendChild(el('text', {x:padL+4, y:y-2, fill:'#0c0e14', 'font-size':'10', 'font-family':'IBM Plex Mono,monospace', 'font-weight':'700'}, ptxt));
  }

  container.innerHTML = '';
  container.appendChild(svg);
}

// ─── Render Functions ─────────────────────────────────────────────────────────
function renderMain(data) {
  let html = '';

  // STAT STRIP
  const bal = data.balance || {};
  const available = bal.available || 0;
  const portfolio = bal.portfolio || 0;
  const fg = (data.macro || {}).fear_greed;
  const sym = data.symphony || {};
  const posCount = (data.positions || []).length;
  const ordCount = (data.resting_orders || []).length;

  const totalCost = (data.positions || []).reduce((s, p) => s + (p.cost_basis || 0), 0);
  const totalMV = (data.positions || []).reduce((s, p) => s + (p.market_value || 0), 0);
  const totalPnl = totalMV - totalCost;

  html += `<div class="stat-strip">
    <div class="stat"><div class="stat-v w">${fmtDollar(portfolio)}</div><div class="stat-l">Portfolio</div></div>
    <div class="stat"><div class="stat-v g">${fmtDollar(available)}</div><div class="stat-l">Cash</div></div>
    <div class="stat"><div class="stat-v b">${posCount}</div><div class="stat-l">Positions</div></div>
    <div class="stat"><div class="stat-v mu">${ordCount}</div><div class="stat-l">Orders</div></div>
    <div class="stat"><div class="stat-v ${colorClass(totalPnl)}">${fmtDollar(totalPnl)}</div><div class="stat-l">Unrealized</div></div>
    <div class="fg-badge ${fgClass(fg)}">F&G: ${fg} · ${fgLabel(fg)}</div>
  </div>`;

  // FLEET SIGNALS
  const btc = (data.assets || {}).BTC || {};
  const eth = (data.assets || {}).ETH || {};
  const macro = data.macro || {};
  const symState = sym.state || '—';
  const symConf = sym.confidence || 0;
  let symBadgeClass = 'badge-m';
  if (symState.includes('OVERRIDE') || symState.includes('BULL')) symBadgeClass = 'badge-g';
  else if (symState.includes('BEAR')) symBadgeClass = 'badge-r';

  html += `<div class="fleet-grid">
    <div class="fleet-asset">SYMPHONY</div>
    <div class="fleet-badges">
      <span class="badge ${symBadgeClass}">${symState} ${symConf}%</span>
      <span class="badge badge-m">${sym.assets_aligned ? sym.assets_aligned.length + '/11 ALIGNED' : '—'}</span>
    </div>
    <div class="fleet-sep"></div>
    <div class="fleet-asset">BTC</div>
    <div class="fleet-badges">
      ${phaseBadge(btc.eagle_phase)}
      ${cvdBadge(btc.eagle_cvd)}
      ${btc.nano_phase ? `<span class="badge ${btc.nano_phase === 'ACCUMULATION' ? 'badge-g' : btc.nano_phase === 'DISTRIBUTION' ? 'badge-r' : 'badge-m'}">NANO: ${btc.nano_phase?.substring(0,5) || '—'}</span>` : ''}
      ${btc.rsi != null ? `<span class="badge badge-m">RSI: ${Number(btc.rsi).toFixed(0)}</span>` : ''}
      ${btc.best_rr_long != null ? `<span class="badge badge-b">R:R ${Number(btc.best_rr_long).toFixed(1)}:1 ${btc.best_rr_tf || ''}</span>` : ''}
      ${btc.ema_200_distance_pct != null ? `<span class="badge ${Number(btc.ema_200_distance_pct) >= 0 ? 'badge-g' : 'badge-r'}">EMA200 ${fmtPct(btc.ema_200_distance_pct)}</span>` : ''}
    </div>
    <div class="fleet-asset">ETH</div>
    <div class="fleet-badges">
      ${phaseBadge(eth.eagle_phase)}
      ${cvdBadge(eth.eagle_cvd)}
      ${eth.nano_phase ? `<span class="badge ${eth.nano_phase === 'ACCUMULATION' ? 'badge-g' : eth.nano_phase === 'DISTRIBUTION' ? 'badge-r' : 'badge-m'}">NANO: ${eth.nano_phase?.substring(0,5) || '—'}</span>` : ''}
      ${eth.rsi != null ? `<span class="badge badge-m">RSI: ${Number(eth.rsi).toFixed(0)}</span>` : ''}
      ${eth.best_rr_long != null ? `<span class="badge badge-b">R:R ${Number(eth.best_rr_long).toFixed(1)}:1 ${eth.best_rr_tf || ''}</span>` : ''}
      ${eth.ema_200_distance_pct != null ? `<span class="badge ${Number(eth.ema_200_distance_pct) >= 0 ? 'badge-g' : 'badge-r'}">EMA200 ${fmtPct(eth.ema_200_distance_pct)}</span>` : ''}
    </div>
    <div class="fleet-sep"></div>
    <div class="fleet-asset">MACRO</div>
    <div class="fleet-badges">
      <span class="badge badge-m">WTHR: ${macro.weatherman_score > 0 ? '+' : ''}${macro.weatherman_score} · ${macro.weatherman_bias || '—'}</span>
      <span class="badge badge-m">ONCHAIN: ${macro.onchain_score > 0 ? '+' : ''}${macro.onchain_score} · ${macro.onchain_bias || '—'}</span>
    </div>
  </div>`;

  // PRICE LADDERS
  html += `<div class="ladders">
    <div class="ladder-card">
      <div class="ladder-hdr">
        <div class="ladder-title b">BTC</div>
        <div class="ladder-price">${fmtPrice(btc.price, 'BTC')}</div>
      </div>
      <div class="ladder-meta">
        EMA200: ${fmtPrice(btc.ema_200, 'BTC')} (${fmtPct(btc.ema_200_distance_pct)}) &nbsp;·&nbsp;
        1h: ${fmtPrice(btc.floor_1h,'BTC')} – ${fmtPrice(btc.ceiling_1h,'BTC')}
      </div>
      <div id="ladder-btc"></div>
      <div class="ladder-legend">
        <div class="leg-item"><span class="leg-line" style="background:#e8ecf4;height:2px"></span> Price</div>
        <div class="leg-item"><span class="leg-line" style="background:#f0c050;height:1px;border-top:2px dashed #f0c050"></span> EMA200</div>
        <div class="leg-item"><span class="leg-line" style="background:#ff6b8a;height:1px"></span> Ceiling</div>
        <div class="leg-item"><span class="leg-line" style="background:#5efa9e;height:1px"></span> Floor</div>
        <div class="leg-item"><span class="leg-line" style="background:#60a0f0;height:1px;border-top:2px dashed #60a0f0"></span> Strikes</div>
      </div>
    </div>
    <div class="ladder-card">
      <div class="ladder-hdr">
        <div class="ladder-title c">ETH</div>
        <div class="ladder-price">${fmtPrice(eth.price, 'ETH')}</div>
      </div>
      <div class="ladder-meta">
        EMA200: ${fmtPrice(eth.ema_200, 'ETH')} (${fmtPct(eth.ema_200_distance_pct)}) &nbsp;·&nbsp;
        1h: ${fmtPrice(eth.floor_1h,'ETH')} – ${fmtPrice(eth.ceiling_1h,'ETH')}
      </div>
      <div id="ladder-eth"></div>
      <div class="ladder-legend">
        <div class="leg-item"><span class="leg-line" style="background:#e8ecf4;height:2px"></span> Price</div>
        <div class="leg-item"><span class="leg-line" style="background:#f0c050;height:1px;border-top:2px dashed #f0c050"></span> EMA200</div>
        <div class="leg-item"><span class="leg-line" style="background:#ff6b8a;height:1px"></span> Ceiling</div>
        <div class="leg-item"><span class="leg-line" style="background:#5efa9e;height:1px"></span> Floor</div>
        <div class="leg-item"><span class="leg-line" style="background:#60a0f0;height:1px;border-top:2px dashed #60a0f0"></span> Strikes</div>
      </div>
    </div>
  </div>`;

  // POSITIONS TABLE
  const positions = data.positions || [];
  if (positions.length > 0) {
    let totalMaxPayout = positions.reduce((s, p) => s + (p.quantity || 0), 0);
    html += `<div class="section">
      <div class="stitle">Open Positions <span class="stitle-sub">${positions.length} active · Max payout ${fmtDollar(totalMaxPayout, 0)}</span></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Contract</th><th>Side</th><th>Qty</th>
          <th>Entry</th><th>Now</th><th>Cost</th><th>Mkt Value</th>
          <th>Unrealized</th><th>Max ROI</th><th>Sell Target</th>
        </tr></thead>
        <tbody>`;
    positions.forEach(p => {
      const nowPrice = p.quantity > 0 ? p.market_value / p.quantity : 0;
      const maxPayout = p.quantity * 1.0;
      const maxRoi = p.avg_entry > 0 ? ((1 - p.avg_entry) / p.avg_entry * 100) : 0;
      const sells = (p.sell_targets || []);
      const bestSell = sells.length > 0 ? sells.reduce((a, b) => (b.price > a.price ? b : a)) : null;
      const pnlClass = p.unrealized_pnl >= 0 ? 'g' : 'r';
      html += `<tr>
        <td>
          <div class="w strong">${shortTicker(p.ticker, p.asset)}</div>
          <div class="td-ticker">${p.ticker}</div>
        </td>
        <td><span class="tag ${p.side === 'yes' ? 'tag-yes' : 'tag-no'}">${(p.side||'').toUpperCase()}</span></td>
        <td class="w">${(p.quantity||0).toLocaleString()}</td>
        <td class="mu">${fmtCents(p.avg_entry)}</td>
        <td class="w">${fmtCents(nowPrice)}</td>
        <td class="mu">${fmtDollar(p.cost_basis)}</td>
        <td class="w">${fmtDollar(p.market_value)}</td>
        <td class="${pnlClass}">${fmtDollar(p.unrealized_pnl)} <span style="font-size:11px">(${fmtPct(p.unrealized_pct)})</span></td>
        <td class="g">+${Math.round(maxRoi)}%</td>
        <td>${bestSell ? `<span class="tag tag-sell">${Math.round(bestSell.price*100)}¢ × ${bestSell.qty}</span>` : '<span class="mu">—</span>'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>
      <div class="summary-row">
        <span class="mu">Total Cost</span><span class="w">${fmtDollar(totalCost)}</span>
        <span class="mu">Total MV</span><span class="w">${fmtDollar(totalMV)}</span>
        <span class="mu">Unrealized</span><span class="${colorClass(totalPnl)}">${fmtDollar(totalPnl)}</span>
        <span class="mu">Max Settlement</span><span class="g">${fmtDollar(totalMaxPayout, 0)}</span>
      </div>
    </div>`;
  }

  // RESTING ORDERS
  const orders = data.resting_orders || [];
  const sellOrders = orders.filter(o => o.action === 'sell');
  const buyOrders  = orders.filter(o => o.action === 'buy');

  if (orders.length > 0) {
    html += `<div class="section">
      <div class="stitle">Resting Orders <span class="stitle-sub">${sellOrders.length} sell traps · ${buyOrders.length} buy traps</span></div>`;

    if (sellOrders.length > 0) {
      html += `<div style="font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px">Exit Targets (Sell)</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Contract</th><th>Side</th><th>Qty</th><th>Limit</th><th>Remaining</th><th>ROI if Filled</th><th>Status</th></tr></thead>
        <tbody>`;
      sellOrders.forEach(o => {
        // Find matching position for ROI calc
        const matchPos = positions.find(p => p.ticker === o.ticker);
        const entry = matchPos ? matchPos.avg_entry : 0;
        const fillRoi = entry > 0 ? ((o.price - entry) / entry * 100) : null;
        html += `<tr>
          <td><div class="w">${shortTicker(o.ticker, '')}</div><div class="td-ticker">${o.ticker}</div></td>
          <td><span class="tag tag-sell">SELL</span></td>
          <td class="w">${(o.quantity||0).toLocaleString()}</td>
          <td class="y">${fmtCents(o.price)}</td>
          <td class="mu">${(o.remaining||0).toLocaleString()}</td>
          <td class="${fillRoi != null && fillRoi > 0 ? 'g' : 'mu'}">${fillRoi != null ? fmtPct(fillRoi) : '—'}</td>
          <td><span class="tag tag-rest">RESTING</span></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    }

    if (buyOrders.length > 0) {
      html += `<div style="font-size:11px;color:var(--m);text-transform:uppercase;letter-spacing:.5px;margin:12px 0 5px">Buy Traps (Limit Buy)</div>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Contract</th><th>Side</th><th>Qty</th><th>Limit</th><th>Remaining</th><th>Max ROI</th><th>Status</th></tr></thead>
        <tbody>`;
      buyOrders.forEach(o => {
        const maxRoi = o.price > 0 ? ((1 - o.price) / o.price * 100) : null;
        html += `<tr>
          <td><div class="w">${shortTicker(o.ticker, '')}</div><div class="td-ticker">${o.ticker}</div></td>
          <td><span class="tag tag-buy">BUY</span></td>
          <td class="w">${(o.quantity||0).toLocaleString()}</td>
          <td class="g">${fmtCents(o.price)}</td>
          <td class="mu">${(o.remaining||0).toLocaleString()}</td>
          <td class="g">${maxRoi != null ? '+' + Math.round(maxRoi) + '%' : '—'}</td>
          <td><span class="tag tag-rest">RESTING</span></td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    }
    html += `</div>`;
  }

  // CATALYST COUNTDOWN
  const catalysts = data.catalysts || [];
  if (catalysts.length > 0) {
    html += `<div class="section">
      <div class="stitle">Catalyst Countdown</div>
      <div class="tl-events">`;
    catalysts.forEach(c => {
      const cd = countdown(c.dt || c.datetime);
      const isPast = cd === null;
      const impactLower = (c.impact || 'med').toLowerCase();
      html += `<div class="tl-event impact-${impactLower} ${isPast ? 'tl-past' : ''}">
        <div class="tl-name impact-${impactLower}">${c.name || c.event || ''}</div>
        <div class="tl-countdown ${isPast ? 'mu' : (impactLower === 'extreme' ? 'r' : impactLower === 'high' ? 'y' : 'b')}">${isPast ? 'PAST' : cd}</div>
        <div class="tl-note">${c.note || c.notes || ''}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // LEDGER STATS
  const ledger = data.ledger || {};
  if (ledger.today_fired > 0) {
    html += `<div class="section">
      <div class="stitle">System Stats</div>
      <div class="stat-strip">
        <div class="stat"><div class="stat-v ${(ledger.today_hit_rate||0)>=50?'g':'r'}">${ledger.today_hit_rate||0}%</div><div class="stat-l">Today Hit Rate</div></div>
        <div class="stat"><div class="stat-v g">${ledger.today_wins||0}</div><div class="stat-l">Today W</div></div>
        <div class="stat"><div class="stat-v r">${ledger.today_losses||0}</div><div class="stat-l">Today L</div></div>
        <div class="stat"><div class="stat-v w">${ledger.today_fired||0}</div><div class="stat-l">Signals Today</div></div>
        <div class="stat"><div class="stat-v ${(ledger.total_hit_rate||0)>=50?'g':'r'}">${(ledger.total_hit_rate||0).toFixed(1)}%</div><div class="stat-l">All-Time Hit Rate</div></div>
        <div class="stat"><div class="stat-v w">${(ledger.total_wins||0) + (ledger.total_losses||0)}</div><div class="stat-l">All-Time Signals</div></div>
      </div>
    </div>`;
  }

  // RULES FOOTER
  html += `<div class="section">
    <div class="stitle">Protocol Rules</div>
    <div class="rules-grid">
      <div class="rule-card">
        <div class="rule-title">Ping Pong Entry</div>
        <ul>
          <li>Buy fear — enter when F&G ≤ 25</li>
          <li>Fleet ACCUM = buy dips early</li>
          <li>BREAKOUT_ATTEMPT = enter YES limit</li>
          <li>Symphony OVERRIDE = full size allowed</li>
        </ul>
      </div>
      <div class="rule-card">
        <div class="rule-title">Exit Protocol</div>
        <ul>
          <li>Sell appreciation — never wait for settlement blind</li>
          <li>Sell into strength, not weakness</li>
          <li>CAP / RESIST phase → trim positions</li>
          <li>Set limit sells at each catalysts level</li>
        </ul>
      </div>
      <div class="rule-card">
        <div class="rule-title">Kill Conditions</div>
        <ul>
          <li>F&G ≤ 10 = max accumulate, skip OVER boost</li>
          <li>CVD flip bearish = tighten or exit longs</li>
          <li>DISTRIBUTION trap = reduce immediately</li>
          <li>Tariff day = do NOT hold to settlement blind</li>
        </ul>
      </div>
    </div>
  </div>`;

  html += `<div class="footer">Athanor Umbra · Ping Pong Terminal · Not financial advice<br><span>Data refreshes every 60s · All contracts settle Apr 3 5pm EDT</span></div>`;

  document.getElementById('main').innerHTML = html;

  // Draw SVG ladders after DOM renders
  requestAnimationFrame(() => {
    const btcEl = document.getElementById('ladder-btc');
    const ethEl = document.getElementById('ladder-eth');
    if (btcEl) buildLadder(btcEl, 'BTC', data);
    if (ethEl) buildLadder(ethEl, 'ETH', data);
  });
}

// ─── Data Fetch ───────────────────────────────────────────────────────────────
async function fetchData() {
  const errEl = document.getElementById('errBanner');
  try {
    const r = await fetch('data/dashboard_data.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    _data = await r.json();
    _lastFetch = Date.now();
    errEl.style.display = 'none';
    renderMain(_data);
    updateStatusBar();
  } catch(e) {
    errEl.textContent = 'Data fetch failed: ' + e.message + ' · Retrying in 60s';
    errEl.style.display = 'block';
    document.getElementById('upd-dot').style.background = 'var(--r)';
    document.getElementById('upd-time').textContent = 'Fetch error — ' + e.message;
  }
}

function updateStatusBar() {
  if (!_lastFetch) return;
  const dot = document.getElementById('upd-dot');
  const timeEl = document.getElementById('upd-time');
  const nextEl = document.getElementById('upd-next');
  dot.style.background = 'var(--gd)';

  // updated time from data
  const updStr = _data && _data.updated ? _data.updated : '';
  timeEl.textContent = 'Live data: ' + secsAgo(updStr) + (updStr ? ' · ' + updStr.substring(0,16).replace('T',' ') + 'Z' : '');

  // countdown to next fetch
  const secsToNext = Math.max(0, Math.ceil((REFRESH_INTERVAL - (Date.now() - _lastFetch)) / 1000));
  nextEl.textContent = 'Refresh in ' + secsToNext + 's';
}

function startRefreshLoop() {
  // Update status bar every second
  if (_countdownTimer) clearInterval(_countdownTimer);
  _countdownTimer = setInterval(() => {
    if (_lastFetch) updateStatusBar();
  }, 1000);

  // Fetch data every 60s
  if (_refreshTimer) clearInterval(_refreshTimer);
  _refreshTimer = setInterval(fetchData, REFRESH_INTERVAL);
}

// ─── Init ─────────────────────────────────────────────────────────────────────
fetchData();
startRefreshLoop();

// Rerender on resize (for SVG ladder widths)
let _resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(() => {
    if (_data) {
      const btcEl = document.getElementById('ladder-btc');
      const ethEl = document.getElementById('ladder-eth');
      if (btcEl) buildLadder(btcEl, 'BTC', _data);
      if (ethEl) buildLadder(ethEl, 'ETH', _data);
    }
  }, 150);
});
</script>
