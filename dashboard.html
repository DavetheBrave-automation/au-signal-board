<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ping Pong War Room · Athanor Umbra</title>
<style>
:root {
  --text: #1a1a1a; --dim: #666; --hint: #999;
  --border: rgba(0,0,0,0.1);
  --card-bg: rgba(0,0,0,0.03);
  --green: #2d8a4e; --red: #c0392b; --blue: #2c7be5; --purple: #7c3aed;
  --yellow: #b45309;
  --green-bg: rgba(45,138,78,0.08); --red-bg: rgba(192,57,43,0.08);
  --blue-bg: rgba(44,123,229,0.08); --purple-bg: rgba(124,58,237,0.08);
  --yellow-bg: rgba(180,83,9,0.08);
  font-size: 14px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --text: #e0e0e0; --dim: #999; --hint: #555;
    --border: rgba(255,255,255,0.1);
    --card-bg: rgba(255,255,255,0.05);
    --green: #5cab5c; --red: #c45c5c; --blue: #6ba3d6; --purple: #9b7ed8;
    --yellow: #d97706;
    --green-bg: rgba(92,171,92,0.1); --red-bg: rgba(196,92,92,0.1);
    --blue-bg: rgba(107,163,214,0.1); --purple-bg: rgba(155,126,216,0.1);
    --yellow-bg: rgba(217,119,6,0.1);
  }
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: var(--text);
  line-height: 1.5;
  padding: 16px;
  max-width: 1200px;
  margin: 0 auto;
}
/* Numbers always monospace */
.mono { font-family: 'SF Mono', 'Consolas', 'Menlo', monospace; }

/* ── Layout ── */
.section { margin-bottom: 20px; }
.section-title {
  font-size: 11px; font-weight: 600; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--dim);
  margin-bottom: 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
}
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── Header ── */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 6px;
  flex-wrap: wrap;
  gap: 8px;
}
.header-left h1 {
  font-size: 18px; font-weight: 700; letter-spacing: -0.3px;
}
.header-left .sub { font-size: 12px; color: var(--dim); margin-top: 2px; }
.header-right { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
.stat-item { text-align: right; }
.stat-value { font-size: 18px; font-weight: 700; font-family: 'SF Mono','Consolas','Menlo',monospace; }
.stat-label { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.5px; }
.stat-item.green .stat-value { color: var(--green); }
.stat-item.red .stat-value { color: var(--red); }
.stat-item.blue .stat-value { color: var(--blue); }
.meta-bar {
  display: flex; justify-content: space-between; align-items: center;
  font-size: 11px; color: var(--dim);
  margin-bottom: 16px;
}
#data-age { font-size: 11px; color: var(--hint); }

/* ── Badges ── */
.badges { display: flex; flex-wrap: wrap; gap: 5px; }
.badge {
  font-size: 11px; font-weight: 500;
  padding: 3px 8px; border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--card-bg);
  white-space: nowrap;
}
.badge.green { color: var(--green); background: var(--green-bg); border-color: var(--green); }
.badge.red { color: var(--red); background: var(--red-bg); border-color: var(--red); }
.badge.blue { color: var(--blue); background: var(--blue-bg); border-color: var(--blue); }
.badge.purple { color: var(--purple); background: var(--purple-bg); border-color: var(--purple); }
.badge.yellow { color: var(--yellow); background: var(--yellow-bg); border-color: var(--yellow); }
.badge.dim { color: var(--dim); }

/* ── Ladders ── */
.ladders { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ladder-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.ladder-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 10px 12px 6px;
}
.ladder-asset { font-size: 13px; font-weight: 700; }
.ladder-price { font-size: 20px; font-weight: 700; font-family: 'SF Mono','Consolas','Menlo',monospace; }
.ladder-svg-wrap { padding: 0 0 8px; }
.ladder-legend {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 4px 12px 10px;
  font-size: 10px; color: var(--dim);
}
.leg-item { display: flex; align-items: center; gap: 4px; }
.leg-line { display: inline-block; width: 18px; height: 2px; }

/* ── Cycle Tracker ── */
.cycle-table-wrap { overflow-x: auto; }
.cycle-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.cycle-table th {
  padding: 6px 10px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; color: var(--dim);
  border-bottom: 1px solid var(--border);
  text-align: left; white-space: nowrap;
  background: var(--card-bg);
}
.cycle-table td {
  padding: 8px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.cycle-table tr:last-child td { border-bottom: none; }
.cycle-table tr.needs-action { background: rgba(192,57,43,0.04); }
.pos-name { font-weight: 600; }
.pos-sub { font-size: 11px; color: var(--dim); margin-top: 1px; font-family: 'SF Mono','Consolas','Menlo',monospace; }
.arrow { color: var(--hint); font-size: 16px; padding: 0 6px; vertical-align: middle; }
.status-badge {
  font-size: 10px; font-weight: 700; padding: 2px 7px;
  border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px;
  white-space: nowrap; display: inline-block;
}
.status-done     { color: var(--green); background: var(--green-bg); }
.status-filling  { color: var(--green); background: var(--green-bg); }
.status-resting  { color: var(--blue);  background: var(--blue-bg);  }
.status-cycling  { color: var(--green); background: var(--green-bg); }
.status-action   { color: var(--red);   background: var(--red-bg);   }

/* ── Side panels ── */
.side-panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.panel-title { font-size: 12px; font-weight: 700; margin-bottom: 10px; }
.panel-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; border-bottom: 1px solid var(--border); }
.panel-row:last-child { border-bottom: none; }
.panel-row .label { color: var(--dim); font-size: 12px; }
.panel-row .val { font-family: 'SF Mono','Consolas','Menlo',monospace; font-weight: 600; }

/* ── Short side watch ── */
.watch-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
.watch-status {
  font-size: 12px; font-weight: 700; padding: 3px 10px;
  border-radius: 4px; margin-top: 8px; text-align: center;
}
.watch-active   { color: var(--red);   background: var(--red-bg);   border: 1px solid var(--red);   }
.watch-inactive { color: var(--dim);   background: var(--card-bg);  border: 1px solid var(--border); }

/* ── Catalysts ── */
.catalyst-row { display: flex; gap: 8px; flex-wrap: wrap; }
.catalyst-card {
  flex: 1; min-width: 100px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 12px;
  text-align: center;
}
.catalyst-card.risk-MAX  { border-color: var(--red);    }
.catalyst-card.risk-HIGH { border-color: var(--yellow);  }
.catalyst-card.risk-MED  { border-color: var(--border); }
.catalyst-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.catalyst-card.risk-MAX  .catalyst-label { color: var(--red);   }
.catalyst-card.risk-HIGH .catalyst-label { color: var(--yellow); }
.catalyst-card.risk-MED  .catalyst-label { color: var(--dim);   }
.catalyst-countdown {
  font-size: 16px; font-weight: 700;
  font-family: 'SF Mono','Consolas','Menlo',monospace;
  margin: 2px 0;
}
.catalyst-risk { font-size: 10px; color: var(--hint); margin-top: 2px; }
.catalyst-past { opacity: 0.4; }

/* ── Footer ── */
.footer {
  margin-top: 24px;
  padding: 12px 0;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--dim);
  line-height: 1.6;
}
.footer strong { color: var(--text); }

/* ── Responsive ── */
@media (max-width: 680px) {
  .ladders, .side-panels { grid-template-columns: 1fr; }
  .header { flex-direction: column; }
  .catalyst-row { flex-direction: column; }
  .header-right { flex-direction: row; flex-wrap: wrap; gap: 12px; }
}

/* ── Pulsing dot animation for current price ── */
@keyframes pulse-dot {
  0%,100% { opacity: 1; r: 4; }
  50%      { opacity: 0.4; r: 6; }
}
.price-dot { animation: pulse-dot 2s ease-in-out infinite; }
</style>
</head>
<body>

<div id="app">
  <div style="text-align:center;padding:60px;color:var(--dim);">
    Waiting for data… Agent writes <code>dashboard_data.json</code> on next cycle.
  </div>
</div>

<script>
'use strict';

// ─── Data ────────────────────────────────────────────────────────────────────
let dashData = null;

// ─── Helpers ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = {
  dollar(v, d=2) {
    if (v == null || isNaN(v)) return '—';
    return '$' + Number(v).toFixed(d).replace(/\B(?=(\d{3})+(?!\d))/g, ',');
  },
  cents(v) {
    if (v == null || isNaN(v)) return '—';
    return Math.round(Number(v) * 100) + '¢';
  },
  price(v) {
    if (!v) return '—';
    return '$' + Math.round(Number(v)).toLocaleString();
  },
  pct(v, d=1) {
    if (v == null || isNaN(v)) return '—';
    const n = Number(v);
    return (n >= 0 ? '+' : '') + n.toFixed(d) + '%';
  },
  countdown(dtStr) {
    const ms = new Date(dtStr).getTime() - Date.now();
    if (ms <= 0) return null;
    const h = Math.floor(ms / 3600000);
    const m = Math.floor((ms % 3600000) / 60000);
    if (h >= 48) return Math.floor(h/24) + 'd ' + (h%24) + 'h';
    if (h >= 1) return h + 'h ' + m + 'm';
    return m + 'm';
  },
  age(dtStr) {
    if (!dtStr) return '';
    const mins = Math.round((Date.now() - new Date(dtStr).getTime()) / 60000);
    if (mins < 1) return 'just now';
    return mins + 'm ago';
  }
};

// Signal coloring
function sigClass(phase) {
  if (!phase) return 'dim';
  const p = phase.toUpperCase();
  if (/ACCUM|BREAK|BULL|LONG|OVERRIDE|SNAP/.test(p)) return 'green';
  if (/DIST|CAP|BEAR|RESIST|SHORT/.test(p)) return 'red';
  if (/NEUTRAL|RANGE|FLAT/.test(p)) return 'dim';
  return 'dim';
}
function fgClass(v) {
  const n = Number(v);
  if (n <= 25) return 'red';
  if (n >= 75) return 'green';
  return 'blue';
}
function fgLabel(v) {
  const n = Number(v);
  if (n <= 10) return 'EXTREME FEAR';
  if (n <= 25) return 'FEAR';
  if (n <= 45) return 'LEAN BEAR';
  if (n <= 55) return 'NEUTRAL';
  if (n <= 75) return 'LEAN BULL';
  if (n <= 90) return 'GREED';
  return 'EXT. GREED';
}

// ─── SVG Ladder ──────────────────────────────────────────────────────────────
function drawLadder(container, assetKey, data) {
  const a = data[assetKey.toLowerCase()];
  if (!a) return;

  const price = a.price || 0;
  const ema   = a.ema200 || 0;
  const lev   = a.levels || {};

  // Collect all significant prices
  const allP = [price, ema, lev.f5m, lev.f1h, lev.f4h, lev.c1h, lev.c4h, lev.c6h]
    .filter(p => p > 0);

  // Add strikes from positions
  const posList = (data.positions || []).filter(p => p.asset.toLowerCase() === assetKey && p.strike > 0);
  const sells   = (data.sell_orders || []).filter(o => o.asset.toLowerCase() === assetKey);
  posList.forEach(p => allP.push(p.strike));

  if (allP.length < 2) { container.innerHTML = '<div style="padding:20px;color:var(--dim);font-size:12px">Insufficient data</div>'; return; }

  const minP = Math.min(...allP) * 0.988;
  const maxP = Math.max(...allP) * 1.012;

  const W = container.clientWidth || 340;
  const H = 380;
  const padL = 80, padR = 8, padT = 18, padB = 18;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  function yOf(p) {
    return padT + plotH * (1 - (p - minP) / (maxP - minP));
  }
  function priceLbl(p) {
    return '$' + Math.round(p).toLocaleString();
  }

  // Resolve CSS vars for SVG (can't use var() in SVG attributes directly)
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const C = {
    text:   isDark ? '#e0e0e0' : '#1a1a1a',
    dim:    isDark ? '#666'    : '#999',
    grid:   isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)',
    green:  isDark ? '#5cab5c' : '#2d8a4e',
    red:    isDark ? '#c45c5c' : '#c0392b',
    blue:   isDark ? '#6ba3d6' : '#2c7be5',
    purple: isDark ? '#9b7ed8' : '#7c3aed',
    bg:     isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)',
  };

  const NS = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.style.display = 'block';

  function mk(tag, attrs) {
    const e = document.createElementNS(NS, tag);
    for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, String(v));
    return e;
  }
  function hline(y, color, dash, width) {
    return mk('line', {x1:padL, y1:y, x2:padL+plotW, y2:y, stroke:color,
      'stroke-dasharray': dash||'none', 'stroke-width': width||1, 'stroke-linecap': 'round'});
  }
  function leftLabel(y, txt, color, size) {
    const t = mk('text', {x: padL-5, y: y+4, fill: color||C.dim, 'font-size': size||9,
      'font-family': 'SF Mono,Consolas,Menlo,monospace', 'text-anchor': 'end'});
    t.textContent = txt;
    return t;
  }
  function rightLabel(y, txt, color, size) {
    const t = mk('text', {x: padL+plotW+4, y: y+4, fill: color||C.dim, 'font-size': size||9,
      'font-family': 'SF Mono,Consolas,Menlo,monospace', 'text-anchor': 'start'});
    t.textContent = txt;
    return t;
  }

  // Background
  svg.appendChild(mk('rect', {x:padL, y:padT, width:plotW, height:plotH, fill:C.bg}));

  // Subtle grid
  for (let i = 0; i <= 5; i++) {
    const gp = minP + (maxP - minP) * i / 5;
    const gy = yOf(gp);
    svg.appendChild(mk('line', {x1:padL, y1:gy, x2:padL+plotW, y2:gy,
      stroke:C.grid, 'stroke-width':'0.5'}));
  }

  // Helper to draw a named level line if in range
  function level(price, color, dash, width, lbl, rLbl) {
    if (!price || price < minP || price > maxP) return;
    const y = yOf(price);
    svg.appendChild(hline(y, color, dash, width));
    if (lbl) svg.appendChild(leftLabel(y, lbl, color, 9));
    if (rLbl) {
      const t = mk('text', {x: padL+plotW-3, y: y-3, fill:color, 'font-size':'9',
        'font-family': 'SF Mono,Consolas,Menlo,monospace', 'text-anchor': 'end'});
      t.textContent = priceLbl(price);
      svg.appendChild(t);
    }
  }

  // Draw levels (bottom to top visually, order doesn't matter for SVG)
  level(lev.c6h, C.red,    'none',  1.5, '6H CEIL', true);
  level(lev.c4h, C.red,    '6,3',   1,   '4H CEIL', true);
  level(lev.c1h, C.red,    '2,3',   1,   '1H CEIL', true);
  level(ema,     C.purple, 'none',  2,   'EMA 200', true);
  level(lev.f5m, C.green,  '2,3',   1,   '5M FLR',  true);
  level(lev.f1h, C.green,  'none',  1.5, '1H FLR',  true);
  level(lev.f4h, C.green,  '6,3',   1,   '4H FLR',  true);

  // Position strike annotations
  posList.forEach(pos => {
    if (pos.strike < minP || pos.strike > maxP) return;
    const y = yOf(pos.strike);
    // Find matching sell order
    const sell = sells.find(o => o.ticker === pos.ticker || (o.strike === pos.strike));
    const sellTxt = sell ? ` → ${Math.round(sell.price * 100)}¢` : '';
    const label = `${pos.qty}× ${Math.round(pos.entry*100)}¢${sellTxt}`;

    svg.appendChild(mk('line', {
      x1: padL + plotW*0.3, y1: y, x2: padL+plotW, y2: y,
      stroke: C.blue, 'stroke-dasharray': '3,3', 'stroke-width': '1',
    }));
    svg.appendChild(mk('circle', {
      cx: padL + plotW*0.3, cy: y, r: '3', fill: C.blue
    }));
    const lt = mk('text', {
      x: padL+plotW-3, y: y-4, fill: C.blue,
      'font-size': '9', 'font-family': 'SF Mono,Consolas,Menlo,monospace', 'text-anchor': 'end'
    });
    lt.textContent = label;
    svg.appendChild(lt);
  });

  // Current price (most prominent — blue solid, pulsing dot)
  if (price > minP && price < maxP) {
    const y = yOf(price);
    svg.appendChild(hline(y, C.blue, 'none', 2.5));
    // Price tag (filled box on left)
    const ptxt = priceLbl(price);
    const tw = ptxt.length * 6 + 8;
    svg.appendChild(mk('rect', {x: padL-tw-2, y: y-11, width: tw, height: 14, fill: C.blue, rx: '2'}));
    const pt = mk('text', {
      x: padL-6, y: y+1, fill: '#fff',
      'font-size': '9', 'font-weight': '700',
      'font-family': 'SF Mono,Consolas,Menlo,monospace', 'text-anchor': 'end'
    });
    pt.textContent = ptxt;
    svg.appendChild(pt);
    // Pulsing dot on right edge
    const dot = mk('circle', { cx: padL+plotW, cy: y, r: '4', fill: C.blue, class: 'price-dot' });
    svg.appendChild(dot);
  }

  container.innerHTML = '';
  container.appendChild(svg);
}

// ─── Cycle Status ─────────────────────────────────────────────────────────────
function cycleStatus(pos, sellOrders, buyTraps) {
  const sell = sellOrders.find(o =>
    o.ticker === pos.ticker ||
    (o.asset === pos.asset && o.strike === pos.strike)
  );
  const buy = buyTraps.find(o => o.asset === pos.asset);

  if (!sell)                           return 'action_needed';
  if (sell.remaining === 0)            return 'done';
  if (sell.remaining < sell.qty)       return 'filling';
  if (buy)                             return 'cycling';
  return 'resting';
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderDashboard(d) {
  const bal = d.balance || {};
  const btc = d.btc || {};
  const eth = d.eth || {};
  const sym = d.symphony || {};
  const mac = d.macro || {};

  let html = '';

  // SECTION 1: HEADER
  const fg = mac.fg || 0;
  html += `
  <div class="section">
    <div class="header">
      <div class="header-left">
        <h1>Ping Pong War Room · Athanor Umbra</h1>
        <div class="sub">Settlement: <strong>Fri Apr 3, 2026</strong> &nbsp;·&nbsp; Kalshi Crypto Contracts</div>
      </div>
      <div class="header-right">
        <div class="stat-item">
          <div class="stat-value mono">${fmt.dollar(bal.portfolio_value)}</div>
          <div class="stat-label">Portfolio</div>
        </div>
        <div class="stat-item green">
          <div class="stat-value">${fmt.dollar(bal.available)}</div>
          <div class="stat-label">Cash</div>
        </div>
        <div class="stat-item blue">
          <div class="stat-value">${fmt.dollar(bal.deployed)}</div>
          <div class="stat-label">Deployed</div>
        </div>
        <div class="stat-item ${fgClass(fg)}">
          <div class="stat-value">${fg} · ${fgLabel(fg)}</div>
          <div class="stat-label">Fear &amp; Greed</div>
        </div>
      </div>
    </div>
    <div class="meta-bar">
      <span>Mon Mar 31, 2026</span>
      <span id="data-age">${fmt.age(d.updated_at)}</span>
    </div>
  </div>`;

  // SECTION 2: FLEET BADGES
  const btcSigC = sigClass(btc.eagle);
  const ethSigC = sigClass(eth.eagle);
  const symC = sym.state && /OVERRIDE|BULL/.test(sym.state.toUpperCase()) ? 'purple' : 'dim';
  html += `
  <div class="section">
    <div class="section-title">Fleet Signals</div>
    <div class="badges">
      <span class="badge ${symC}">SYM: ${sym.state || '—'} ${sym.confidence ? sym.confidence + '%' : ''}</span>
      <span class="badge ${btcSigC}">BTC: ${btc.eagle || '—'}</span>
      <span class="badge ${sigClass(btc.eagle_cvd)}">BTC CVD: ${btc.eagle_cvd || '—'}</span>
      <span class="badge ${btc.rsi > 60 ? 'green' : btc.rsi < 40 ? 'red' : 'dim'}">BTC RSI: ${btc.rsi ? Number(btc.rsi).toFixed(0) : '—'}</span>
      <span class="badge ${sigClass(btc.nano)}">BTC NANO: ${btc.nano || '—'}</span>
      <span class="badge dim">BTC R:R ${btc.rr_best_long ? Number(btc.rr_best_long).toFixed(1) + ':1' : '—'} ${btc.rr_best_timeframe || ''}</span>
      <span class="badge ${sigClass(btc.vulture_bias)}">BTC BIAS: ${btc.vulture_bias || '—'}</span>
      <span class="badge dim">BTC EMA200 ${btc.ema200_distance_pct != null ? fmt.pct(btc.ema200_distance_pct) : '—'}</span>
      <span class="badge ${ethSigC}">ETH: ${eth.eagle || '—'}</span>
      <span class="badge ${sigClass(eth.eagle_cvd)}">ETH CVD: ${eth.eagle_cvd || '—'}</span>
      <span class="badge ${eth.rsi > 60 ? 'green' : eth.rsi < 40 ? 'red' : 'dim'}">ETH RSI: ${eth.rsi ? Number(eth.rsi).toFixed(0) : '—'}</span>
      <span class="badge ${sigClass(eth.nano)}">ETH NANO: ${eth.nano || '—'}</span>
      <span class="badge dim">ETH R:R ${eth.rr_best_long ? Number(eth.rr_best_long).toFixed(1) + ':1' : '—'} ${eth.rr_best_timeframe || ''}</span>
      <span class="badge ${sigClass(mac.bias)}">MACRO: ${mac.bias || '—'}</span>
      <span class="badge dim">WTHR: ${mac.weatherman > 0 ? '+' : ''}${mac.weatherman}</span>
    </div>
  </div>`;

  // SECTION 3: PRICE LADDERS
  html += `
  <div class="section">
    <div class="section-title">Price Ladders</div>
    <div class="ladders">
      <div class="ladder-card">
        <div class="ladder-header">
          <div class="ladder-asset" style="color:var(--blue)">BTC</div>
          <div class="ladder-price">${fmt.price(btc.price)}</div>
        </div>
        <div class="ladder-svg-wrap" id="ladder-btc-wrap"></div>
        <div class="ladder-legend">
          <div class="leg-item"><span class="leg-line" style="background:var(--blue)"></span>Price</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--purple)"></span>EMA200</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--red)"></span>Ceiling</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--green)"></span>Floor</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--blue);height:1px;border-style:dashed"></span>Strikes</div>
        </div>
      </div>
      <div class="ladder-card">
        <div class="ladder-header">
          <div class="ladder-asset" style="color:var(--purple)">ETH</div>
          <div class="ladder-price">${fmt.price(eth.price)}</div>
        </div>
        <div class="ladder-svg-wrap" id="ladder-eth-wrap"></div>
        <div class="ladder-legend">
          <div class="leg-item"><span class="leg-line" style="background:var(--blue)"></span>Price</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--purple)"></span>EMA200</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--red)"></span>Ceiling</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--green)"></span>Floor</div>
          <div class="leg-item"><span class="leg-line" style="background:var(--blue);height:1px;border-style:dashed"></span>Strikes</div>
        </div>
      </div>
    </div>
  </div>`;

  // SECTION 4: PING PONG CYCLE TRACKER
  const positions = d.positions || [];
  const sellOrders = d.sell_orders || [];
  const buyTraps   = d.buy_traps  || [];
  html += `
  <div class="section">
    <div class="section-title">Ping Pong Cycle Tracker</div>
    <div class="cycle-table-wrap">
      <table class="cycle-table">
        <thead>
          <tr>
            <th>Position</th>
            <th>Hold</th>
            <th></th>
            <th>Sell Target</th>
            <th></th>
            <th>Rebuy</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>`;

  if (positions.length === 0) {
    html += `<tr><td colspan="7" style="text-align:center;color:var(--dim);padding:20px">No open positions</td></tr>`;
  } else {
    positions.forEach(pos => {
      const status = cycleStatus(pos, sellOrders, buyTraps);
      const needsAction = status === 'action_needed';
      const rowClass = needsAction ? 'needs-action' : '';

      const sell = sellOrders.find(o =>
        o.ticker === pos.ticker || (o.asset === pos.asset && o.strike === pos.strike)
      );
      const buy = buyTraps.find(o => o.asset === pos.asset);

      // Position label: BTC ≥$68,300
      const posLabel = `${pos.asset} ≥${fmt.price(pos.strike)}`;

      // Hold: qty × entry¢ = cost
      const costFmt = pos.cost_basis ? fmt.dollar(pos.cost_basis) : fmt.dollar((pos.qty||0)*(pos.entry||0));
      const holdTxt = `${(pos.qty||0).toLocaleString()} × ${fmt.cents(pos.entry)} = ${costFmt}`;

      // Sell target
      let sellTxt = '—';
      let profitTxt = '';
      if (sell) {
        const profit = pos.entry > 0 ? ((sell.price - pos.entry) / pos.entry * 100) : 0;
        const filled  = (sell.qty || 0) - (sell.remaining || 0);
        sellTxt = `${(sell.remaining||0).toLocaleString()} × ${fmt.cents(sell.price)}`;
        profitTxt = `<div class="pos-sub" style="color:var(--green)">${fmt.pct(profit)} ROI · ${filled > 0 ? filled + ' filled' : 'none filled'}</div>`;
      }

      // Rebuy
      const rebuyTxt = buy ? `${(buy.remaining||buy.qty||0).toLocaleString()} × ${fmt.cents(buy.price)} ${buy.asset}` : '—';

      // Status badge
      const statusLabels = {
        done: ['DONE', 'status-done'],
        filling: ['FILLING', 'status-filling'],
        resting: ['RESTING', 'status-resting'],
        cycling: ['CYCLING', 'status-cycling'],
        action_needed: ['ACTION NEEDED', 'status-action'],
      };
      const [sLabel, sClass] = statusLabels[status] || ['—', ''];

      html += `
        <tr class="${rowClass}">
          <td>
            <div class="pos-name">${posLabel}</div>
            <div class="pos-sub">${pos.side?.toUpperCase() || 'YES'} · MV ${fmt.dollar(pos.market_value)}</div>
          </td>
          <td class="mono" style="font-size:12px">${holdTxt}</td>
          <td class="arrow">→</td>
          <td>
            <div class="mono" style="font-size:12px">${sellTxt}</div>
            ${profitTxt}
          </td>
          <td class="arrow">→</td>
          <td class="mono" style="font-size:12px;color:var(--green)">${rebuyTxt}</td>
          <td><span class="status-badge ${sClass}">${sLabel}</span></td>
        </tr>`;
    });
  }
  html += `</tbody></table></div></div>`;

  // SECTION 5: SIDE PANELS
  // Profit banked: sell orders with fully filled (remaining === 0) or partially filled
  const bankedProfit = sellOrders.reduce((sum, o) => {
    const filled = (o.qty || 0) - (o.remaining || 0);
    if (filled <= 0) return sum;
    const pos = positions.find(p => p.ticker === o.ticker || (p.asset === o.asset && p.strike === o.strike));
    const entry = pos ? pos.entry : 0;
    return sum + (o.price - entry) * filled;
  }, 0);
  const pendingMV = positions.reduce((sum, p) => sum + (p.market_value || 0), 0);
  const pendingCost = positions.reduce((sum, p) => sum + (p.cost_basis || (p.qty||0)*(p.entry||0)), 0);

  const btcDist = (btc.nano || '').toUpperCase() === 'DISTRIBUTION';
  const ethDist = (eth.nano || '').toUpperCase() === 'DISTRIBUTION';
  const shortSideActive = btcDist && ethDist;

  html += `
  <div class="section">
    <div class="section-title">Position Overview</div>
    <div class="side-panels">
      <div class="card">
        <div class="panel-title">Profit &amp; Exposure</div>
        <div class="panel-row">
          <span class="label">Profit banked</span>
          <span class="val" style="color:${bankedProfit >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt.dollar(bankedProfit)}</span>
        </div>
        <div class="panel-row">
          <span class="label">Total cost basis</span>
          <span class="val">${fmt.dollar(pendingCost)}</span>
        </div>
        <div class="panel-row">
          <span class="label">Total market value</span>
          <span class="val">${fmt.dollar(pendingMV)}</span>
        </div>
        <div class="panel-row">
          <span class="label">Unrealized</span>
          <span class="val" style="color:${pendingMV - pendingCost >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt.dollar(pendingMV - pendingCost)}</span>
        </div>
        <div class="panel-row">
          <span class="label">Open positions</span>
          <span class="val">${positions.length}</span>
        </div>
        <div class="panel-row">
          <span class="label">Resting sells</span>
          <span class="val">${sellOrders.length}</span>
        </div>
        <div class="panel-row">
          <span class="label">Buy traps</span>
          <span class="val">${buyTraps.length}</span>
        </div>
      </div>

      <div class="card">
        <div class="panel-title">Short Side Watch</div>
        <div class="watch-row">
          <span>BTC Nano</span>
          <span class="badge ${btcDist ? 'red' : 'green'}">${btc.nano || '—'}</span>
        </div>
        <div class="watch-row">
          <span>ETH Nano</span>
          <span class="badge ${ethDist ? 'red' : 'green'}">${eth.nano || '—'}</span>
        </div>
        <div class="watch-row">
          <span>BTC Zone</span>
          <span class="badge dim">${btc.nano_zone_weight || '—'}</span>
        </div>
        <div class="watch-row">
          <span>ETH Zone</span>
          <span class="badge dim">${eth.nano_zone_weight || '—'}</span>
        </div>
        <div class="watch-status ${shortSideActive ? 'watch-active' : 'watch-inactive'}">
          NO scanning: ${shortSideActive ? 'ACTIVE — scan bearish contracts' : 'INACTIVE — fleet not in DIST'}
        </div>
        ${shortSideActive ? `
        <div style="font-size:12px;color:var(--dim);margin-top:8px;line-height:1.5">
          Both BTC + ETH Nano in DISTRIBUTION.<br>
          Check edge scanner for NO contracts.
        </div>` : ''}
      </div>
    </div>
  </div>`;

  // SECTION 6: CATALYST TIMELINE
  const catalysts = d.catalysts || [];
  html += `
  <div class="section">
    <div class="section-title">Catalyst Timeline</div>
    <div class="catalyst-row">`;
  catalysts.forEach(c => {
    const cd = fmt.countdown(c.date);
    const past = cd === null;
    html += `
      <div class="catalyst-card risk-${c.risk} ${past ? 'catalyst-past' : ''}">
        <div class="catalyst-label">${c.label}</div>
        <div class="catalyst-countdown" style="color:var(${c.risk === 'MAX' ? '--red' : c.risk === 'HIGH' ? '--yellow' : '--dim'})">${past ? 'PAST' : cd}</div>
        <div class="catalyst-risk">${c.risk}</div>
      </div>`;
  });
  html += `</div></div>`;

  // FOOTER
  html += `
  <div class="footer">
    <strong>Ping Pong Rules:</strong>
    Sell half at 2× entry · Set sells AND rebuys simultaneously · Fleet bullish = YES only · Fleet bearish = scan NOs ·
    Never hold to settlement blind · Trade the appreciation, not the outcome ·
    F&amp;G ≤ 25 = buy the dip · DIST phase = trim or rotate
  </div>`;

  document.getElementById('app').innerHTML = html;

  // Draw SVG ladders after DOM update
  requestAnimationFrame(() => {
    const btcWrap = document.getElementById('ladder-btc-wrap');
    const ethWrap = document.getElementById('ladder-eth-wrap');
    if (btcWrap) drawLadder(btcWrap, 'btc', d);
    if (ethWrap) drawLadder(ethWrap, 'eth', d);
  });
}

// ─── Fetch & Refresh ──────────────────────────────────────────────────────────
async function fetchData() {
  try {
    const resp = await fetch('data/dashboard_data.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    dashData = await resp.json();
    renderDashboard(dashData);
    updateDataAge();
  } catch (e) {
    const app = document.getElementById('app');
    if (!dashData) {
      app.innerHTML = `<div style="text-align:center;padding:60px;color:var(--dim);">
        Waiting for data… Agent writes <code>dashboard_data.json</code> on next cycle.<br>
        <small style="color:var(--hint)">${e.message}</small>
      </div>`;
    }
  }
}

function updateDataAge() {
  if (!dashData) return;
  const el = document.getElementById('data-age');
  if (el) el.textContent = 'Data: ' + fmt.age(dashData.updated_at);
}

// ─── Resize: redraw SVG ladders ───────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (!dashData) return;
    const btcWrap = document.getElementById('ladder-btc-wrap');
    const ethWrap = document.getElementById('ladder-eth-wrap');
    if (btcWrap) drawLadder(btcWrap, 'btc', dashData);
    if (ethWrap) drawLadder(ethWrap, 'eth', dashData);
  }, 150);
});

// ─── Init ─────────────────────────────────────────────────────────────────────
fetchData();
setInterval(fetchData, 60000);
setInterval(updateDataAge, 10000);
</script>
</body>
</html>
